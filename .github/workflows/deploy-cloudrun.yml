# ──────────────────────────────────────────────────────────────────────────────
# Deploy to Cloud Run — Orchestrator Workflow
#
# Triggers:
#   1. Push to main → auto-detect changed services and deploy only those
#   2. Manual dispatch → select individual services or all, always uses main
#
# This workflow calls the reusable deploy-service.yml for each service that
# needs to be deployed. Terraform infrastructure changes are handled by the
# separate terraform.yml workflow.
#
# Prerequisites (GitHub Secrets):
#   GCP_PROJECT_ID      — GCP project ID
#   GCP_REGION          — GCP region (e.g. us-central1)
#   GCS_MODELS_BUCKET   — gs:// URI of the GCS models bucket
#   WIF_PROVIDER        — Workload Identity Federation provider resource name
#   WIF_SERVICE_ACCOUNT — Deploy service account email
# ──────────────────────────────────────────────────────────────────────────────

name: Deploy to Cloud Run

on:
  push:
    branches:
      - main
    # Only trigger when actual service code changes — not Terraform or docs
    paths:
      - "api/**"
      - "frontend/**"
      - "ai-code-converter/**"
      - "code-analysis-engine/**"
      - "decision-engine/**"
      - "hardware-abstraction-layer/**"

  workflow_dispatch:
    inputs:
      deploy_api:
        description: "Deploy api"
        type: boolean
        default: false
      deploy_frontend:
        description: "Deploy frontend"
        type: boolean
        default: false
      deploy_ai_code_converter:
        description: "Deploy ai-code-converter"
        type: boolean
        default: false
      deploy_code_analysis_engine:
        description: "Deploy code-analysis-engine"
        type: boolean
        default: false
      deploy_decision_engine:
        description: "Deploy decision-engine"
        type: boolean
        default: false
      deploy_hardware_abstraction_layer:
        description: "Deploy hardware-abstraction-layer"
        type: boolean
        default: false
      deploy_all:
        description: "Deploy ALL services (overrides individual selections)"
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: ${{ secrets.GCP_REGION }}
  GAR_REPOSITORY: nexar
  MODELS_BUCKET: ${{ secrets.GCS_MODELS_BUCKET }}

jobs:
  # ─── Detect which services need to be deployed ───────────────────────────
  detect-changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.set-outputs.outputs.api }}
      frontend: ${{ steps.set-outputs.outputs.frontend }}
      ai-code-converter: ${{ steps.set-outputs.outputs.ai-code-converter }}
      code-analysis-engine: ${{ steps.set-outputs.outputs.code-analysis-engine }}
      decision-engine: ${{ steps.set-outputs.outputs.decision-engine }}
      hardware-abstraction-layer: ${{ steps.set-outputs.outputs.hardware-abstraction-layer }}
      any_service: ${{ steps.any-check.outputs.any_service }}
    steps:
      - name: Checkout (main)
        uses: actions/checkout@v4
        with:
          ref: main

      # Path-based change detection (push events only)
      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: changes
        if: github.event_name == 'push'
        with:
          filters: |
            api:
              - 'api/**'
            frontend:
              - 'frontend/**'
            ai-code-converter:
              - 'ai-code-converter/**'
            code-analysis-engine:
              - 'code-analysis-engine/**'
            decision-engine:
              - 'decision-engine/**'
            hardware-abstraction-layer:
              - 'hardware-abstraction-layer/**'

      # Merge push detection + manual dispatch into unified outputs
      - name: Set outputs
        id: set-outputs
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            DEPLOY_ALL="${{ github.event.inputs.deploy_all }}"
            echo "🔧 Manual dispatch — deploy_all=${DEPLOY_ALL}"

            if [[ "${DEPLOY_ALL}" == "true" ]]; then
              echo "api=true"                        >> "$GITHUB_OUTPUT"
              echo "frontend=true"                   >> "$GITHUB_OUTPUT"
              echo "ai-code-converter=true"          >> "$GITHUB_OUTPUT"
              echo "code-analysis-engine=true"       >> "$GITHUB_OUTPUT"
              echo "decision-engine=true"            >> "$GITHUB_OUTPUT"
              echo "hardware-abstraction-layer=true"  >> "$GITHUB_OUTPUT"
            else
              echo "api=${{ github.event.inputs.deploy_api }}"                                     >> "$GITHUB_OUTPUT"
              echo "frontend=${{ github.event.inputs.deploy_frontend }}"                           >> "$GITHUB_OUTPUT"
              echo "ai-code-converter=${{ github.event.inputs.deploy_ai_code_converter }}"         >> "$GITHUB_OUTPUT"
              echo "code-analysis-engine=${{ github.event.inputs.deploy_code_analysis_engine }}"   >> "$GITHUB_OUTPUT"
              echo "decision-engine=${{ github.event.inputs.deploy_decision_engine }}"             >> "$GITHUB_OUTPUT"
              echo "hardware-abstraction-layer=${{ github.event.inputs.deploy_hardware_abstraction_layer }}" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "🔍 Push event — using paths-filter results"
            echo "api=${{ steps.changes.outputs.api }}"                                       >> "$GITHUB_OUTPUT"
            echo "frontend=${{ steps.changes.outputs.frontend }}"                             >> "$GITHUB_OUTPUT"
            echo "ai-code-converter=${{ steps.changes.outputs.ai-code-converter }}"           >> "$GITHUB_OUTPUT"
            echo "code-analysis-engine=${{ steps.changes.outputs.code-analysis-engine }}"     >> "$GITHUB_OUTPUT"
            echo "decision-engine=${{ steps.changes.outputs.decision-engine }}"               >> "$GITHUB_OUTPUT"
            echo "hardware-abstraction-layer=${{ steps.changes.outputs.hardware-abstraction-layer }}" >> "$GITHUB_OUTPUT"
          fi

      # Check if ANY service will be deployed (used by downstream summary job)
      - name: Check if any service selected
        id: any-check
        shell: bash
        run: |
          if [[ "${{ steps.set-outputs.outputs.api }}" == "true" || \
                "${{ steps.set-outputs.outputs.frontend }}" == "true" || \
                "${{ steps.set-outputs.outputs.ai-code-converter }}" == "true" || \
                "${{ steps.set-outputs.outputs.code-analysis-engine }}" == "true" || \
                "${{ steps.set-outputs.outputs.decision-engine }}" == "true" || \
                "${{ steps.set-outputs.outputs.hardware-abstraction-layer }}" == "true" ]]; then
            echo "any_service=true" >> "$GITHUB_OUTPUT"
          else
            echo "any_service=false" >> "$GITHUB_OUTPUT"
            echo "⚠️  No services selected for deployment."
          fi

      - name: Summary
        shell: bash
        run: |
          echo "### 🚀 Deployment Targets" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Service | Deploy |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| api | \`${{ steps.set-outputs.outputs.api }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| frontend | \`${{ steps.set-outputs.outputs.frontend }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ai-code-converter | \`${{ steps.set-outputs.outputs.ai-code-converter }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| code-analysis-engine | \`${{ steps.set-outputs.outputs.code-analysis-engine }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| decision-engine | \`${{ steps.set-outputs.outputs.decision-engine }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| hardware-abstraction-layer | \`${{ steps.set-outputs.outputs.hardware-abstraction-layer }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Trigger:** \`${{ github.event_name }}\` | **Ref:** \`main\` | **Actor:** @${{ github.actor }}" >> "$GITHUB_STEP_SUMMARY"

  # ─── Deploy each changed / selected service ──────────────────────────────
  # All deploy jobs check out from main (via deploy-service.yml)

  deploy-api:
    needs: detect-changes
    if: needs.detect-changes.outputs.api == 'true'
    uses: ./.github/workflows/deploy-service.yml
    with:
      service_name: api
      service_dir: api
      port: "3000"
      needs_models: false
      ref: main
    secrets: inherit

  deploy-frontend:
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    uses: ./.github/workflows/deploy-service.yml
    with:
      service_name: frontend
      service_dir: frontend
      port: "8080"
      needs_models: false
      ref: main
    secrets: inherit

  deploy-ai-code-converter:
    needs: detect-changes
    if: needs.detect-changes.outputs.ai-code-converter == 'true'
    uses: ./.github/workflows/deploy-service.yml
    with:
      service_name: ai-code-converter
      service_dir: ai-code-converter
      port: "8001"
      needs_models: true
      models_gcs_path: "ai-code-converter/models"
      models_dest_path: "models"
      ref: main
    secrets: inherit

  deploy-code-analysis-engine:
    needs: detect-changes
    if: needs.detect-changes.outputs.code-analysis-engine == 'true'
    uses: ./.github/workflows/deploy-service.yml
    with:
      service_name: code-analysis-engine
      service_dir: code-analysis-engine
      port: "8002"
      needs_models: true
      models_gcs_path: "code-analysis-engine/models/trained"
      models_dest_path: "models/trained"
      ref: main
    secrets: inherit

  deploy-decision-engine:
    needs: detect-changes
    if: needs.detect-changes.outputs.decision-engine == 'true'
    uses: ./.github/workflows/deploy-service.yml
    with:
      service_name: decision-engine
      service_dir: decision-engine
      port: "8003"
      needs_models: false
      ref: main
    secrets: inherit

  deploy-hardware-abstraction-layer:
    needs: detect-changes
    if: needs.detect-changes.outputs.hardware-abstraction-layer == 'true'
    uses: ./.github/workflows/deploy-service.yml
    with:
      service_name: hardware-abstraction-layer
      service_dir: hardware-abstraction-layer
      port: "8004"
      needs_models: false
      ref: main
    secrets: inherit

  # ─── Post-deploy summary ─────────────────────────────────────────────────
  summary:
    name: Deployment summary
    runs-on: ubuntu-latest
    if: always()
    needs:
      - detect-changes
      - deploy-api
      - deploy-frontend
      - deploy-ai-code-converter
      - deploy-code-analysis-engine
      - deploy-decision-engine
      - deploy-hardware-abstraction-layer
    steps:
      - name: Write summary
        shell: bash
        run: |
          echo "### 📋 Deployment Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Service | Selected | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|----------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| api | \`${{ needs.detect-changes.outputs.api }}\` | \`${{ needs.deploy-api.result }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| frontend | \`${{ needs.detect-changes.outputs.frontend }}\` | \`${{ needs.deploy-frontend.result }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ai-code-converter | \`${{ needs.detect-changes.outputs.ai-code-converter }}\` | \`${{ needs.deploy-ai-code-converter.result }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| code-analysis-engine | \`${{ needs.detect-changes.outputs.code-analysis-engine }}\` | \`${{ needs.deploy-code-analysis-engine.result }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| decision-engine | \`${{ needs.detect-changes.outputs.decision-engine }}\` | \`${{ needs.deploy-decision-engine.result }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| hardware-abstraction-layer | \`${{ needs.detect-changes.outputs.hardware-abstraction-layer }}\` | \`${{ needs.deploy-hardware-abstraction-layer.result }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Ref:** \`main\` | **SHA:** \`${{ github.sha }}\` | **Actor:** @${{ github.actor }}" >> "$GITHUB_STEP_SUMMARY"

          # Fail the summary job if any selected service deployment failed
          FAILED="false"
          if [[ "${{ needs.deploy-api.result }}" == "failure" ]]; then FAILED="true"; fi
          if [[ "${{ needs.deploy-frontend.result }}" == "failure" ]]; then FAILED="true"; fi
          if [[ "${{ needs.deploy-ai-code-converter.result }}" == "failure" ]]; then FAILED="true"; fi
          if [[ "${{ needs.deploy-code-analysis-engine.result }}" == "failure" ]]; then FAILED="true"; fi
          if [[ "${{ needs.deploy-decision-engine.result }}" == "failure" ]]; then FAILED="true"; fi
          if [[ "${{ needs.deploy-hardware-abstraction-layer.result }}" == "failure" ]]; then FAILED="true"; fi

          if [[ "${FAILED}" == "true" ]]; then
            echo "❌ One or more service deployments failed!" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          else
            echo "✅ All selected services deployed successfully (or were skipped)." >> "$GITHUB_STEP_SUMMARY"
          fi
