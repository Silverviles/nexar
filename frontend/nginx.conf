server {
    listen ${PORT};
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 256;

    # Reverse proxy /api/ to the API gateway
    # - resolver: needed so nginx can resolve Cloud Run HTTPS domains
    # - set $upstream: forces per-request DNS resolution (not just at startup)
    # - proxy_ssl_server_name: sends SNI so Cloud Run routes to the right service
    # - Host = API_HOST: Cloud Run requires the correct Host header to route traffic
    location /api/ {
        resolver 8.8.8.8 8.8.4.4 valid=30s;

        set $upstream ${API_URL};
        proxy_pass $upstream/api/;

        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Host ${API_HOST};
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # SPA fallback — serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
