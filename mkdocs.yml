site_name: Nexar
site_description: Intelligent Quantum-Classical Code Routing Platform
site_url: https://silverviles.github.io/nexar
repo_url: https://github.com/Silverviles/nexar
repo_name: Silverviles/nexar

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.integrate
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Project Description: project-description.md
  - Getting Started:
      - Setup Guide: getting-started/setup.md
      - Quick Start: getting-started/quickstart.md
  - Architecture:
      - System Overview: architecture/overview.md
      - Services:
          - API Gateway: architecture/services/api-gateway.md
          - Code Analysis Engine: architecture/services/code-analysis-engine.md
          - Decision Engine: architecture/services/decision-engine.md
          - AI Code Converter: architecture/services/ai-code-converter.md
          - Hardware Abstraction Layer: architecture/services/hardware-abstraction-layer.md
          - Frontend: architecture/services/frontend.md
  - Research:
      - Proposals:
          - Overview: research/proposals/index.md
          - AI Code Converter: research/proposals/ai-code-converter.md
          - Code Analysis Engine: research/proposals/code-analysis-engine.md
          - Decision Engine: research/proposals/decision-engine.md
          - Hardware Abstraction Layer: research/proposals/hardware-abstraction-layer.md
      - Progress Reports:
          - Overview: research/progress-reports/index.md
          - AI Code Converter: research/progress-reports/ai-code-converter.md
          - Code Analysis Engine: research/progress-reports/code-analysis-engine.md
          - Decision Engine: research/progress-reports/decision-engine.md
          - Hardware Abstraction Layer: research/progress-reports/hardware-abstraction-layer.md
      - Deployment Report: research/deployment-report.md
